name: MASTER BUILD - Soundvi CI/CD

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What do you want to do?'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - build-and-release
          - test
      platform:
        description: 'Platform to build for (all = windows + linux + macos)'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - windows
          - macos
          - all
      version:
        description: 'Version number (e.g., 4.8.0)'
        required: true
        default: '4.8.0'
        type: string
      mode:
        description: 'Build mode'
        required: true
        default: 'onefile'
        type: choice
        options:
          - onefile
          - onedir

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.11'
  PYTHONUTF8: '1'
  PYTHONIOENCODING: 'utf-8'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_test: ${{ steps.check.outputs.should_test }}
      should_release: ${{ steps.check.outputs.should_release }}
    
    steps:
    - name: Check action type
      id: check
      run: |
        echo "Action requested: ${{ inputs.action }}"
        echo "should_build=${{ inputs.action == 'build' || inputs.action == 'build-and-release' }}" >> $GITHUB_OUTPUT
        echo "should_test=${{ inputs.action == 'test' || inputs.action == 'build-and-release' }}" >> $GITHUB_OUTPUT
        echo "should_release=${{ inputs.action == 'build-and-release' }}" >> $GITHUB_OUTPUT

  # -----------------------------------------------------------------------
  #  Build para Linux y macOS (shell bash nativo)
  #  Se usa matrix strategy cuando platform == 'all' para Linux + macOS
  # -----------------------------------------------------------------------
  build-unix:
    needs: setup
    if: >-
      needs.setup.outputs.should_build == 'true' &&
      (inputs.platform == 'linux' || inputs.platform == 'macos' || inputs.platform == 'all')
    runs-on: ${{ matrix.target_platform == 'macos' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        target_platform: ${{ inputs.platform == 'all' && fromJSON('["linux","macos"]') || fromJSON(format('["{0}"]', inputs.platform)) }}
        exclude:
          - target_platform: windows
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    
    - name: Create virtual environment
      run: |
        python -m venv venv
        echo "VENV_ACTIVATE=venv/bin/activate" >> $GITHUB_ENV
    
    - name: Install system dependencies
      run: |
        if [ "${{ runner.os }}" = "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y ffmpeg libxcb-cursor0
        elif [ "${{ runner.os }}" = "macOS" ]; then
          brew install ffmpeg
        fi
    
    - name: Install Python dependencies
      run: |
        source $VENV_ACTIVATE
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        pip install librosa moviepy pydub soundfile numba || echo "Optional deps failed"
        echo "=== Installed packages ==="
        pip list | grep -E "(PyQt|numpy|opencv|librosa|moviepy|pyinstaller)" || true
    
    - name: Run build
      env:
        PYTHONUTF8: '1'
        PYTHONIOENCODING: 'utf-8'
      run: |
        source $VENV_ACTIVATE
        echo "=== Building Soundvi ==="
        echo "Platform: ${{ matrix.target_platform }}"
        echo "Version: ${{ inputs.version }}"
        echo "Mode: ${{ inputs.mode }}"
        
        CMD="python build.py --platform ${{ matrix.target_platform }} --version ${{ inputs.version }} --clean"
        if [ "${{ inputs.mode }}" = "onefile" ]; then
          CMD="$CMD --onefile"
        fi
        
        echo "Command: $CMD"
        eval $CMD
    
    - name: Verify build output
      run: |
        echo "=== Build verification ==="
        DIST_DIR="dist/${{ matrix.target_platform }}"
        if [ -d "$DIST_DIR" ]; then
          echo "[OK] $DIST_DIR directory created successfully"
          echo "Files in $DIST_DIR:"
          find "$DIST_DIR" -type f | while read f; do
            size=$(du -h "$f" 2>/dev/null | cut -f1 || echo "N/A")
            echo "  - $f ($size)"
          done
          echo "[OK] Build verified"
        elif [ -d "dist" ]; then
          echo "[OK] dist/ directory found (legacy layout)"
          find dist -type f | head -20
        else
          echo "[FAIL] dist/ directory not found!"
          pwd
          ls -la
          exit 1
        fi
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-${{ matrix.target_platform }}-${{ inputs.version }}-${{ inputs.mode }}
        path: dist/
        if-no-files-found: error

  # -----------------------------------------------------------------------
  #  Build para Windows (shell PowerShell)
  # -----------------------------------------------------------------------
  build-windows:
    needs: setup
    if: >-
      needs.setup.outputs.should_build == 'true' &&
      (inputs.platform == 'windows' || inputs.platform == 'all')
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    
    - name: Create virtual environment
      shell: pwsh
      run: |
        python -m venv venv
        echo "VENV_ACTIVATE=venv\Scripts\Activate.ps1" >> $env:GITHUB_ENV
    
    - name: Install system dependencies (ffmpeg)
      shell: pwsh
      run: |
        choco install ffmpeg --no-progress -y
        refreshenv
    
    - name: Install Python dependencies
      shell: pwsh
      env:
        PYTHONUTF8: '1'
        PYTHONIOENCODING: 'utf-8'
      run: |
        & venv\Scripts\Activate.ps1
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        pip install librosa moviepy pydub soundfile numba 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host "Optional deps failed (non-fatal)" }
        Write-Host "=== Installed packages ==="
        pip list | Select-String -Pattern "(PyQt|numpy|opencv|librosa|moviepy|pyinstaller)"
    
    - name: Run build
      shell: pwsh
      env:
        PYTHONUTF8: '1'
        PYTHONIOENCODING: 'utf-8'
      run: |
        & venv\Scripts\Activate.ps1
        Write-Host "=== Building Soundvi ==="
        Write-Host "Platform: windows"
        Write-Host "Version: ${{ inputs.version }}"
        Write-Host "Mode: ${{ inputs.mode }}"
        
        $CMD = "python build.py --platform windows --version ${{ inputs.version }} --clean"
        if ("${{ inputs.mode }}" -eq "onefile") {
          $CMD = "$CMD --onefile"
        }
        
        Write-Host "Command: $CMD"
        Invoke-Expression $CMD
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    
    - name: Verify build output
      shell: pwsh
      run: |
        Write-Host "=== Build verification ==="
        $distDir = "dist\windows"
        if (Test-Path $distDir) {
          Write-Host "[OK] $distDir directory created successfully"
          Write-Host "Files in ${distDir}:"
          Get-ChildItem -Path $distDir -Recurse -File | ForEach-Object {
            $size = "{0:N2} MB" -f ($_.Length / 1MB)
            Write-Host "  - $($_.FullName) ($size)"
          }
          Write-Host "[OK] Build verified"
        } elseif (Test-Path "dist") {
          Write-Host "[OK] dist/ directory found (legacy layout)"
          Get-ChildItem -Path dist -Recurse -File | Select-Object -First 20
        } else {
          Write-Host "[FAIL] dist/ directory not found!"
          Get-Location
          Get-ChildItem
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-windows-${{ inputs.version }}-${{ inputs.mode }}
        path: dist/
        if-no-files-found: error

  # -----------------------------------------------------------------------
  #  Tests
  # -----------------------------------------------------------------------
  test:
    needs: setup
    if: needs.setup.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    
    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      env:
        PYTHONUTF8: '1'
        PYTHONIOENCODING: 'utf-8'
      run: |
        source venv/bin/activate
        echo "=== Running tests ==="
        
        # Test imports
        python -c "
        try:
            from core.profiles import ProfileManager
            print('[OK] ProfileManager import OK')
            
            from gui.qt6.theme import AdministradorTemas
            print('[OK] ThemeManager import OK')
            
            print('[OK] All imports successful')
        except Exception as e:
            print(f'[FAIL] Import error: {e}')
            raise
        "
        
        # Test profile system
        python -c "
        from core.profiles import ProfileManager
        pm = ProfileManager()
        pm.cargar()
        assert 'basico' in pm.perfiles_disponibles
        assert 'creador' in pm.perfiles_disponibles
        assert 'profesional' in pm.perfiles_disponibles
        print('[OK] Profile system test passed')
        "

  # -----------------------------------------------------------------------
  #  Release
  # -----------------------------------------------------------------------
  release:
    needs: [setup, build-unix, build-windows, test]
    if: |
      always() &&
      needs.setup.outputs.should_release == 'true' &&
      (needs.build-unix.result == 'success' || needs.build-windows.result == 'success') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: soundvi-*-${{ inputs.version }}-${{ inputs.mode }}
        path: release_files
        merge-multiple: true
    
    - name: List release files
      run: |
        echo "=== Release files ==="
        find release_files -type f | sort
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ inputs.version }}
        name: Soundvi v${{ inputs.version }} (${{ inputs.platform }})
        body: |
          ## Soundvi v${{ inputs.version }}
          
          ### Build Details
          - **Platform:** ${{ inputs.platform }}
          - **Mode:** ${{ inputs.mode }}
          - **Build Date:** ${{ github.workflow_run.created_at }}
          - **Python:** ${{ env.PYTHON_VERSION }}
          
          ### Installation
          1. **Download** the executable for your platform
          2. **Run directly** (no Python required)
          3. **Or install from source:**
          ```bash
          pip install -r requirements.txt
          python main.py --qt6
          ```
          
          ### Build Command
          ```bash
          python build.py --platform ${{ inputs.platform }} --version ${{ inputs.version }} --clean ${{ inputs.mode == 'onefile' && '--onefile' || '' }}
          ```
          
          ### Links
          - [Repository](https://github.com/leriart/Soundvi)
          - [Documentation](https://github.com/leriart/Soundvi#readme)
          - [Issues](https://github.com/leriart/Soundvi/issues)
          
          ---
          
          *Built automatically with GitHub Actions CI/CD*
        draft: false
        prerelease: ${{ !contains(inputs.version, 'stable') }}
        files: release_files/**/*

  # -----------------------------------------------------------------------
  #  Summary
  # -----------------------------------------------------------------------
  summary:
    needs: [setup, build-unix, build-windows, test, release]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Generate summary
      run: |
        echo "## Soundvi CI/CD Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
        echo "- **Build (Unix):** ${{ needs.build-unix.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build (Windows):** ${{ needs.build-windows.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Test:** ${{ needs.test.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release:** ${{ needs.release.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Configuration:" >> $GITHUB_STEP_SUMMARY
        echo "- **Action:** ${{ inputs.action }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Platform:** ${{ inputs.platform }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Mode:** ${{ inputs.mode }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        BUILD_RESULT="${{ needs.build-unix.result || needs.build-windows.result }}"
        if [ "$BUILD_RESULT" = "success" ]; then
          echo "[OK] **Build successful!**" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts are available for download." >> $GITHUB_STEP_SUMMARY
        elif [ "$BUILD_RESULT" = "failure" ]; then
          echo "[FAIL] **Build failed.** Check the build logs for details." >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.release.result }}" = "success" ]; then
          echo "[OK] **Release created!**" >> $GITHUB_STEP_SUMMARY
          echo "Download from: https://github.com/leriart/Soundvi/releases/tag/v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
        fi
