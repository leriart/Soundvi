name: Auto Tag and Release

on:
  push:
    branches:
      - main
      - master

jobs:
  check-version:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get current version
      id: version
      run: |
        # Check if version is defined in a file
        if [ -f "VERSION" ]; then
          CURRENT_VERSION=$(cat VERSION)
        elif [ -f "pyproject.toml" ]; then
          CURRENT_VERSION=$(grep -m1 'version' pyproject.toml | cut -d'"' -f2)
        elif [ -f "setup.py" ]; then
          CURRENT_VERSION=$(grep -m1 'version=' setup.py | cut -d"'" -f2)
        else
          # Default to git describe
          CURRENT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        fi
        
        echo "CURRENT_VERSION=${CURRENT_VERSION#v}" >> $GITHUB_OUTPUT
        echo "Current version: ${CURRENT_VERSION}"
    
    - name: Check for version changes
      id: check-changes
      run: |
        # Get latest tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag: $LATEST_TAG"
        
        # Check if there are changes since last tag
        if git diff --quiet $LATEST_TAG HEAD -- .; then
          echo "No changes since last tag"
          echo "SHOULD_TAG=false" >> $GITHUB_OUTPUT
        else
          echo "Changes detected since last tag"
          echo "SHOULD_TAG=true" >> $GITHUB_OUTPUT
        fi

  create-tag:
    needs: [check-version, check-changes]
    if: needs.check-changes.outputs.SHOULD_TAG == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Configure git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Calculate next version
      id: next-version
      run: |
        CURRENT_VERSION=${{ needs.check-version.outputs.CURRENT_VERSION }}
        
        # Parse version components
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        
        # Check commit messages for version bump type
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        COMMITS_SINCE_TAG=$(git log --oneline $LAST_TAG..HEAD)
        
        # Determine bump type based on commit messages
        if echo "$COMMITS_SINCE_TAG" | grep -q -i "BREAKING CHANGE\|major\|feat!:"; then
          echo "Major version bump"
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        elif echo "$COMMITS_SINCE_TAG" | grep -q -i "feat:"; then
          echo "Minor version bump"
          MINOR=$((MINOR + 1))
          PATCH=0
        else
          echo "Patch version bump"
          PATCH=$((PATCH + 1))
        fi
        
        NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
        echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_OUTPUT
        echo "Next version: $NEXT_VERSION"
    
    - name: Create and push tag
      run: |
        NEXT_VERSION=${{ steps.next-version.outputs.NEXT_VERSION }}
        
        # Create tag
        git tag -a "v$NEXT_VERSION" -m "Release v$NEXT_VERSION"
        
        # Push tag
        git push origin "v$NEXT_VERSION"
    
    - name: Update version file (if exists)
      run: |
        NEXT_VERSION=${{ steps.next-version.outputs.NEXT_VERSION }}
        
        if [ -f "VERSION" ]; then
          echo "$NEXT_VERSION" > VERSION
          git add VERSION
          git commit -m "chore: bump version to v$NEXT_VERSION"
          git push origin main
        fi

  create-release:
    needs: create-tag
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Generate release notes
      id: release-notes
      run: |
        NEXT_VERSION=${{ needs.create-tag.outputs.NEXT_VERSION }}
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 "v$NEXT_VERSION^" 2>/dev/null || echo "")
        
        if [ -z "$PREVIOUS_TAG" ]; then
          COMMIT_RANGE="HEAD"
        else
          COMMIT_RANGE="$PREVIOUS_TAG..v$NEXT_VERSION"
        fi
        
        # Generate changelog
        echo "## What's Changed" > release-notes.md
        echo "" >> release-notes.md
        
        # Group commits by type
        echo "### 🚀 Features" >> release-notes.md
        git log --oneline --grep="^feat:" $COMMIT_RANGE | sed 's/^feat:/•/' >> release-notes.md 2>/dev/null || echo "• No new features" >> release-notes.md
        echo "" >> release-notes.md
        
        echo "### 🐛 Bug Fixes" >> release-notes.md
        git log --oneline --grep="^fix:" $COMMIT_RANGE | sed 's/^fix:/•/' >> release-notes.md 2>/dev/null || echo "• No bug fixes" >> release-notes.md
        echo "" >> release-notes.md
        
        echo "### 🔧 Maintenance" >> release-notes.md
        git log --oneline --grep="^chore:\|^refactor:\|^docs:" $COMMIT_RANGE | sed 's/^[^:]*:/•/' >> release-notes.md 2>/dev/null || echo "• No maintenance changes" >> release-notes.md
        echo "" >> release-notes.md
        
        # Add contributors
        echo "### 👥 Contributors" >> release-notes.md
        git log --format="%an" $COMMIT_RANGE | sort -u | sed 's/^/• /' >> release-notes.md
        echo "" >> release-notes.md
        
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...v$NEXT_VERSION" >> release-notes.md
        
        # Output for next step
        cat release-notes.md
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.create-tag.outputs.NEXT_VERSION }}
        name: Release v${{ needs.create-tag.outputs.NEXT_VERSION }}
        body_path: release-notes.md
        draft: false
        prerelease: false
        generate_release_notes: false