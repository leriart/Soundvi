# .github/workflows/build-and-release.yml
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-executables:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # --- Linux Specific Setup ---
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3-tk
        
    # --- Windows Specific Setup ---
    - name: Install Windows dependencies
      if: runner.os == 'Windows'
      run: |
        choco install ffmpeg -y --no-progress
        echo "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller==6.9.0  # Versión estable

    - name: Set platform-specific variables
      id: set_vars
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Linux" ]]; then
          echo "PYINSTALLER_NAME=soundvi-linux" >> $GITHUB_OUTPUT
          echo "PYINSTALLER_ARGS=--noconsole" >> $GITHUB_OUTPUT
        elif [[ "${{ runner.os }}" == "Windows" ]]; then
          echo "PYINSTALLER_NAME=soundvi-windows.exe" >> $GITHUB_OUTPUT
          echo "PYINSTALLER_ARGS=--windowed" >> $GITHUB_OUTPUT
        fi

    - name: Build with PyInstaller
      run: |
        pyinstaller main.py \
          --onefile \
          --name ${{ steps.set_vars.outputs.PYINSTALLER_NAME }} \
          ${{ steps.set_vars.outputs.PYINSTALLER_ARGS }} \
          --strip \
          --add-data "fonts:fonts" \
          --add-data "logos:logos" \
          --add-data "core:core" \
          --add-data "gui:gui" \
          --add-data "modules:modules" \
          --add-data "utils:utils" \
          --add-data "config.json:." \
          --hidden-import="PIL._imagingtk" \
          --hidden-import="PIL._tkinter_finder"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.set_vars.outputs.PYINSTALLER_NAME }}
        path: dist/${{ steps.set_vars.outputs.PYINSTALLER_NAME }}
        retention-days: 7

  create-release:
    needs: build-executables
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: List downloaded files
      run: find artifacts -type f

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true
        prerelease: false
