name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-executables:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # --- Linux Specific Setup ---
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3-tk xvfb upx

    # --- Windows Specific Setup ---
    - name: Install Windows dependencies
      if: runner.os == 'Windows'
      run: |
        choco install ffmpeg -y --no-progress
        choco install upx -y --no-progress
        echo "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        # Reemplazar opencv-python por headless si existe en requirements
        if [ -f "requirements.txt" ]; then
          sed -i 's/opencv-python/opencv-python-headless/g' requirements.txt
        fi
        pip install -r requirements.txt
        pip install pyinstaller==6.9.0

    # Prueba de importaciones externas (evita errores de clases internas)
    - name: Test imports (Linux)
      if: runner.os == 'Linux'
      run: |
        echo "🧪 Probando importaciones de bibliotecas externas..."
        xvfb-run python -c "
        import sys
        import numpy as np
        import cv2
        from PIL import Image
        import librosa
        import pydub
        import scipy
        import ttkbootstrap
        import moviepy
        import pygame
        import soundfile
        import vosk
        print('✅ Todas las dependencias externas OK')
        "

    - name: Test imports (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "🧪 Probando importaciones de bibliotecas externas..."
        python -c "
        import sys
        import numpy as np
        import cv2
        from PIL import Image
        import librosa
        import pydub
        import scipy
        import ttkbootstrap
        import moviepy
        import pygame
        import soundfile
        import vosk
        print('✅ Todas las dependencias externas OK')
        "

    - name: Set platform-specific variables
      id: set_vars
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Linux" ]]; then
          echo "PYINSTALLER_NAME=soundvi-linux" >> $GITHUB_OUTPUT
          echo "PYINSTALLER_ARGS=--noconsole" >> $GITHUB_OUTPUT
          echo "UPX_DIR=/usr/bin" >> $GITHUB_OUTPUT
        elif [[ "${{ runner.os }}" == "Windows" ]]; then
          echo "PYINSTALLER_NAME=soundvi-windows.exe" >> $GITHUB_OUTPUT
          echo "PYINSTALLER_ARGS=--windowed" >> $GITHUB_OUTPUT
          # UPX en Windows se instala en chocolatey/bin, que ya está en PATH
          echo "UPX_DIR=" >> $GITHUB_OUTPUT
        fi

    - name: Build with PyInstaller
      run: |
        # Construir el comando de manera segura
        UPX_OPT=""
        if [[ -n "${{ steps.set_vars.outputs.UPX_DIR }}" ]]; then
          UPX_OPT="--upx-dir ${{ steps.set_vars.outputs.UPX_DIR }}"
        fi
        pyinstaller main.py \
          --onefile \
          --name ${{ steps.set_vars.outputs.PYINSTALLER_NAME }} \
          ${{ steps.set_vars.outputs.PYINSTALLER_ARGS }} \
          --strip \
          ${UPX_OPT} \
          --add-data "fonts:fonts" \
          --add-data "logos:logos" \
          --add-data "core:core" \
          --add-data "gui:gui" \
          --add-data "modules:modules" \
          --add-data "utils:utils" \
          --add-data "config.json:." \
          $( [ -d "modules_config" ] && echo "--add-data modules_config:modules_config" ) \
          --hidden-import="PIL._imagingtk" \
          --hidden-import="PIL._imaging" \
          --hidden-import="PIL._tkinter_finder" \
          --hidden-import="tkinter" \
          main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.set_vars.outputs.PYINSTALLER_NAME }}
        path: dist/${{ steps.set_vars.outputs.PYINSTALLER_NAME }}
        retention-days: 7

  create-release:
    needs: build-executables
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: List downloaded files
      run: find artifacts -type f

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true
        prerelease: false
