name: Build and Release Soundvi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (windows, linux, macos, all)'
        required: true
        default: 'all'
        type: choice
        options:
        - windows
        - linux
        - macos
        - all
      portable:
        description: 'Create portable packages'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.10'

jobs:
  build-windows:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'windows' || inputs.platform == 'all') || github.event_name == 'push'
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install FFmpeg (Windows)
      run: |
        choco install ffmpeg -y
        echo "FFMPEG_PATH=C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin" >> $env:GITHUB_ENV
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka ordered-set zstandard
        pip install -r requirements.txt
    
    - name: Build with Nuitka
      run: |
        python build.py --platform windows --portable
      
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-windows-py${{ matrix.python-version }}
        path: dist/
        retention-days: 7

  build-linux:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'linux' || inputs.platform == 'all') || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka ordered-set zstandard
        pip install -r requirements.txt
    
    - name: Build with Nuitka
      run: |
        python build.py --platform linux --portable
    
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-linux-py${{ matrix.python-version }}
        path: dist/
        retention-days: 7

  build-macos:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'macos' || inputs.platform == 'all') || github.event_name == 'push'
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install FFmpeg (macOS)
      run: |
        brew install ffmpeg
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with PyInstaller
      run: |
        python build.py --platform macos --portable
    
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-macos-py${{ matrix.python-version }}
        path: dist/
        retention-days: 7

  create-release:
    needs: [build-windows, build-linux, build-macos]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: List downloaded artifacts
      run: find artifacts -type f -name "*.exe" -o -name "*.AppImage" -o -name "*.app" -o -name "*.zip" -o -name "*.tar.gz"
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*.exe
          artifacts/**/*.AppImage
          artifacts/**/*.app
          artifacts/**/*.zip
          artifacts/**/*.tar.gz
        generate_release_notes: true
        draft: false
        prerelease: false

  dispatch-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Create manual release
      uses: ncipollo/release-action@v1
      with:
        name: "Manual Build - ${{ github.event.inputs.platform }}"
        tag: "manual-${{ github.run_id }}"
        artifacts: "artifacts/**/*"
        draft: true
        generateReleaseNotes: true
        token: ${{ secrets.GITHUB_TOKEN }}
