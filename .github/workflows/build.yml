name: Build Soundvi Executables

on:
  push:
    tags:
      - 'v*'  # Ejecutar en tags como v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Permitir ejecución manual

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard
    
    - name: Build para Linux con Nuitka
      run: |
        echo "🏗️ Building for Linux..."
        python -m nuitka --standalone --onefile \
          --enable-plugin=tk-inter \
          --include-data-dir=fonts=fonts \
          --include-data-dir=logos=logos \
          --include-data-dir=core=core \
          --include-data-dir=gui=gui \
          --include-data-dir=modules=modules \
          --include-data-dir=utils=utils \
          --include-data-file=config.json=config.json \
          --output-filename=soundvi \
          main.py
        
        mv soundvi.bin soundvi-linux
        chmod +x soundvi-linux
    
    - name: Crear paquete portable Linux
      run: |
        mkdir -p Soundvi-Linux
        cp soundvi-linux Soundvi-Linux/
        cp -r fonts logos core gui modules utils config.json Soundvi-Linux/
        
        cat > Soundvi-Linux/run.sh << 'EOF'
        #!/bin/bash
        echo "Soundvi - Linux Portable"
        echo ""
        ./soundvi-linux
        EOF
        chmod +x Soundvi-Linux/run.sh
        
        tar -czf soundvi-portable-linux.tar.gz Soundvi-Linux/
    
    - name: Subir artefactos Linux
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-linux
        path: |
          soundvi-linux
          soundvi-portable-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard
    
    - name: Build para Windows con Nuitka
      run: |
        echo "🏗️ Building for Windows..."
        python -m nuitka --standalone --onefile `
          --windows-console-mode=disable `
          --enable-plugin=tk-inter `
          --include-data-dir=fonts=fonts `
          --include-data-dir=logos=logos `
          --include-data-dir=core=core `
          --include-data-dir=gui=gui `
          --include-data-dir=modules=modules `
          --include-data-dir=utils=utils `
          --include-data-file=config.json=config.json `
          --output-filename=soundvi.exe `
          main.py
        
        mv soundvi.exe soundvi-windows.exe
    
    - name: Crear paquete portable Windows
      run: |
        mkdir Soundvi-Windows
        copy soundvi-windows.exe Soundvi-Windows\
        xcopy fonts Soundvi-Windows\fonts /E /I
        xcopy logos Soundvi-Windows\logos /E /I
        xcopy core Soundvi-Windows\core /E /I
        xcopy gui Soundvi-Windows\gui /E /I
        xcopy modules Soundvi-Windows\modules /E /I
        xcopy utils Soundvi-Windows\utils /E /I
        copy config.json Soundvi-Windows\
        
        echo @echo off > Soundvi-Windows\Run-Soundvi.bat
        echo echo Soundvi - Windows Portable >> Soundvi-Windows\Run-Soundvi.bat
        echo echo. >> Soundvi-Windows\Run-Soundvi.bat
        echo soundvi-windows.exe >> Soundvi-Windows\Run-Soundvi.bat
        echo pause >> Soundvi-Windows\Run-Soundvi.bat
        
        cd Soundvi-Windows
        7z a ..\soundvi-portable-windows.zip *
    
    - name: Subir artefactos Windows
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-windows
        path: |
          soundvi-windows.exe
          soundvi-portable-windows.zip

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Descargar artefactos Linux
      uses: actions/download-artifact@v4
      with:
        name: soundvi-linux
        path: artifacts/linux
    
    - name: Descargar artefactos Windows
      uses: actions/download-artifact@v4
      with:
        name: soundvi-windows
        path: artifacts/windows
    
    - name: Crear Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/linux/*
          artifacts/windows/*
        generate_release_notes: true
        prerelease: false
