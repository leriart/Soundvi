name: Build Soundvi Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3-tk xvfb

    - name: Instalar dependencias Python
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          pip install ttkbootstrap numpy opencv-python pillow librosa moviepy pygame pydub soundfile scipy vosk matplotlib
        fi
        pip install pyinstaller

    - name: Prueba de importación (con X virtual)
      run: |
        echo "🧪 Probando importación del módulo principal..."
        xvfb-run python -c "from gui.app import SoundviApp; print('✅ GUI importada correctamente')" || echo "⚠️ Advertencia: falló importación de GUI, continuamos"

    - name: Build con PyInstaller (Linux)
      run: |
        pyinstaller --onefile --name soundvi-linux \
          --noconsole \
          --add-data "fonts:fonts" \
          --add-data "logos:logos" \
          --add-data "core:core" \
          --add-data "gui:gui" \
          --add-data "modules:modules" \
          --add-data "utils:utils" \
          --add-data "config.json:." \
          $( [ -d "modules_config" ] && echo "--add-data modules_config:modules_config" ) \
          $( [ -d "vosk_models" ] && echo "--add-data vosk_models:vosk_models" ) \
          --hidden-import="PIL._imagingtk" \
          --hidden-import="PIL._imaging" \
          --hidden-import="PIL._tkinter_finder" \
          --hidden-import="tkinter" \
          main.py
        mv dist/soundvi-linux .
        chmod +x soundvi-linux

    - name: Crear paquete portable (Linux)
      run: |
        mkdir -p Soundvi-Linux
        cp soundvi-linux Soundvi-Linux/
        [ -d "fonts" ] && cp -r fonts Soundvi-Linux/
        [ -d "logos" ] && cp -r logos Soundvi-Linux/
        [ -d "core" ] && cp -r core Soundvi-Linux/
        [ -d "gui" ] && cp -r gui Soundvi-Linux/
        [ -d "modules" ] && cp -r modules Soundvi-Linux/
        [ -d "utils" ] && cp -r utils Soundvi-Linux/
        [ -d "modules_config" ] && cp -r modules_config Soundvi-Linux/
        [ -d "vosk_models" ] && cp -r vosk_models Soundvi-Linux/
        [ -f "config.json" ] && cp config.json Soundvi-Linux/
        cat > Soundvi-Linux/run.sh << 'EOF'
        #!/bin/bash
        echo "Soundvi - Linux Portable"
        echo "Para iniciar: ./soundvi-linux"
        echo ""
        echo "Requisito: FFmpeg instalado (sudo apt install ffmpeg)"
        echo ""
        ./soundvi-linux
        EOF
        chmod +x Soundvi-Linux/run.sh
        tar -czf soundvi-portable-linux.tar.gz Soundvi-Linux/

    - name: Subir artefactos Linux
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-linux
        path: |
          soundvi-linux
          soundvi-portable-linux.tar.gz
        retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias Python
      run: |
        python -m pip install --upgrade pip
        if (Test-Path "requirements.txt") {
          pip install -r requirements.txt
        } else {
          pip install ttkbootstrap numpy opencv-python pillow librosa moviepy pygame pydub soundfile scipy vosk matplotlib
        }
        pip install pyinstaller

    - name: Build con PyInstaller (Windows)
      shell: pwsh
      run: |
        $addData = @(
          "fonts;fonts",
          "logos;logos",
          "core;core",
          "gui;gui",
          "modules;modules",
          "utils;utils",
          "config.json;."
        )
        if (Test-Path "modules_config") { $addData += "modules_config;modules_config" }
        if (Test-Path "vosk_models") { $addData += "vosk_models;vosk_models" }
        $args = @("--onefile", "--name", "soundvi-windows", "--windowed")
        foreach ($item in $addData) {
          $args += "--add-data", $item
        }
        $args += @(
          "--hidden-import=PIL._imagingtk",
          "--hidden-import=PIL._imaging",
          "--hidden-import=PIL._tkinter_finder",
          "--hidden-import=tkinter",
          "main.py"
        )
        pyinstaller @args
        Move-Item dist/soundvi-windows.exe soundvi-windows.exe -Force

    - name: Crear paquete portable (Windows)
      run: |
        New-Item -ItemType Directory -Force -Path Soundvi-Windows
        Copy-Item soundvi-windows.exe Soundvi-Windows\
        if (Test-Path "fonts") { Copy-Item -Recurse fonts Soundvi-Windows\ }
        if (Test-Path "logos") { Copy-Item -Recurse logos Soundvi-Windows\ }
        if (Test-Path "core") { Copy-Item -Recurse core Soundvi-Windows\ }
        if (Test-Path "gui") { Copy-Item -Recurse gui Soundvi-Windows\ }
        if (Test-Path "modules") { Copy-Item -Recurse modules Soundvi-Windows\ }
        if (Test-Path "utils") { Copy-Item -Recurse utils Soundvi-Windows\ }
        if (Test-Path "modules_config") { Copy-Item -Recurse modules_config Soundvi-Windows\ }
        if (Test-Path "vosk_models") { Copy-Item -Recurse vosk_models Soundvi-Windows\ }
        if (Test-Path "config.json") { Copy-Item config.json Soundvi-Windows\ }
        @"
        @echo off
        echo Soundvi - Windows Portable
        echo.
        echo Para iniciar, ejecute soundvi-windows.exe
        echo.
        echo Requisito: FFmpeg instalado y en PATH
        echo Descarga: https://ffmpeg.org/download.html
        echo.
        pause
        "@ | Out-File -FilePath Soundvi-Windows\Run-Soundvi.bat -Encoding ASCII
        Compress-Archive -Path Soundvi-Windows\* -DestinationPath soundvi-portable-windows.zip -Force

    - name: Subir artefactos Windows
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-windows
        path: |
          soundvi-windows.exe
          soundvi-portable-windows.zip
        retention-days: 7

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Descargar artefactos Linux
      uses: actions/download-artifact@v4
      with:
        name: soundvi-linux
        path: artifacts/linux

    - name: Descargar artefactos Windows
      uses: actions/download-artifact@v4
      with:
        name: soundvi-windows
        path: artifacts/windows

    - name: Listar archivos para release
      run: |
        echo "📦 Archivos listos para release:"
        find artifacts/ -type f | while read f; do
          size=$(du -h "$f" | cut -f1)
          echo "  • $(basename "$f") ($size)"
        done

    - name: Crear Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/linux/*
          artifacts/windows/*
        generate_release_notes: true
        prerelease: false
