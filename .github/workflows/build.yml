name: Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version del build'
        required: false
        default: '4.2.0'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libxcb-cursor0

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        python build.py --platform ${{ matrix.platform }} --version ${{ github.event.inputs.version || '4.2.0' }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-${{ matrix.platform }}
        path: dist/
        retention-days: 30
