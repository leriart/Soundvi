name: Build Soundvi Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3-tk xvfb upx

    - name: Instalar dependencias Python
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          sed -i 's/opencv-python/opencv-python-headless/g' requirements.txt
          pip install -r requirements.txt
        else
          pip install ttkbootstrap numpy opencv-python-headless pillow librosa moviepy pygame pydub soundfile scipy vosk
        fi
        pip install pyinstaller

    - name: Prueba de importación (con X virtual)
      run: |
        echo "🧪 Probando importaciones clave..."
        xvfb-run python -c "
        import sys
        import numpy as np
        import cv2
        from PIL import Image
        import librosa
        import pydub
        import scipy
        import ttkbootstrap
        from core.video_generator import VideoGenerator
        from modules.manager import ModuleManager
        print('✅ Todas las dependencias esenciales OK')
        "

    - name: Build con PyInstaller (Linux)
      run: |
        pyinstaller --onefile --name soundvi-linux \
          --noconsole \
          --strip \
          --upx-dir /usr/bin \
          --add-data "fonts:fonts" \
          --add-data "logos:logos" \
          --add-data "core:core" \
          --add-data "gui:gui" \
          --add-data "modules:modules" \
          --add-data "utils:utils" \
          --add-data "config.json:." \
          $( [ -d "modules_config" ] && echo "--add-data modules_config:modules_config" ) \
          --hidden-import="PIL._imagingtk" \
          --hidden-import="PIL._imaging" \
          --hidden-import="PIL._tkinter_finder" \
          --hidden-import="tkinter" \
          main.py
        mv dist/soundvi-linux .
        chmod +x soundvi-linux
        echo "✅ Tamaño final: $(ls -lh soundvi-linux | awk '{print $5}')"

    - name: Subir artefacto Linux
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-linux
        path: soundvi-linux
        retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar UPX (Windows)
      run: |
        curl -L -o upx.zip https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip
        7z x upx.zip -y
        echo "$(pwd)/upx-4.2.4-win64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Instalar dependencias Python
      run: |
        python -m pip install --upgrade pip
        if (Test-Path "requirements.txt") {
          (Get-Content requirements.txt) -replace 'opencv-python', 'opencv-python-headless' | Set-Content requirements.txt
          pip install -r requirements.txt
        } else {
          pip install ttkbootstrap numpy opencv-python-headless pillow librosa moviepy pygame pydub soundfile scipy vosk
        }
        pip install pyinstaller

    - name: Build con PyInstaller (Windows)
      shell: pwsh
      run: |
        $addData = @(
          "fonts;fonts",
          "logos;logos",
          "core;core",
          "gui;gui",
          "modules;modules",
          "utils;utils",
          "config.json;."
        )
        if (Test-Path "modules_config") { $addData += "modules_config;modules_config" }
        $args = @("--onefile", "--name", "soundvi-windows", "--windowed", "--strip", "--upx-exclude=vcruntime140.dll")
        foreach ($item in $addData) {
          $args += "--add-data", $item
        }
        $args += @(
          "--hidden-import=PIL._imagingtk",
          "--hidden-import=PIL._imaging",
          "--hidden-import=PIL._tkinter_finder",
          "--hidden-import=tkinter",
          "main.py"
        )
        pyinstaller @args
        Move-Item dist/soundvi-windows.exe soundvi-windows.exe -Force
        Get-ChildItem soundvi-windows.exe | Select-Object Name, Length

    - name: Subir artefacto Windows
      uses: actions/upload-artifact@v4
      with:
        name: soundvi-windows
        path: soundvi-windows.exe
        retention-days: 7

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Descargar artefactos Linux
      uses: actions/download-artifact@v4
      with:
        name: soundvi-linux
        path: artifacts/linux

    - name: Descargar artefactos Windows
      uses: actions/download-artifact@v4
      with:
        name: soundvi-windows
        path: artifacts/windows

    - name: Listar archivos para release
      run: |
        echo "📦 Archivos listos para release:"
        find artifacts/ -type f | while read f; do
          size=$(du -h "$f" | cut -f1)
          echo "  • $(basename "$f") ($size)"
        done

    - name: Crear Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/linux/*
          artifacts/windows/*
        generate_release_notes: true
        prerelease: false
