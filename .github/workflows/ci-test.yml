name: CI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-python-versions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run basic import tests
      run: |
        python -c "import sys; print(f'Python {sys.version}')"
        python -c "import cv2; print(f'OpenCV {cv2.__version__}')"
        python -c "import numpy; print(f'NumPy {numpy.__version__}')"
        python -c "import librosa; print(f'Librosa {librosa.__version__}')"
        python -c "import moviepy; print(f'MoviePy {moviepy.__version__}')"
    
    - name: Test module imports
      run: |
        python -c "
        try:
            from modules.manager import ModuleManager
            mm = ModuleManager()
            modules = mm.get_module_types()
            print(f'✅ Módulos cargados: {len(modules)}')
            for m in modules:
                print(f'  - {m.name}')
        except Exception as e:
            print(f'❌ Error cargando módulos: {e}')
            import traceback
            traceback.print_exc()
        "
    
    - name: Test core imports
      run: |
        python -c "
        modules_to_test = [
            'core.audio_processing',
            'core.frequency_mapping', 
            'core.video_generator',
            'core.wav2bar_engine',
            'utils.config',
            'utils.ffmpeg',
            'utils.fonts',
            'utils.gpu'
        ]
        
        for module in modules_to_test:
            try:
                __import__(module)
                print(f'✅ {module}')
            except Exception as e:
                print(f'❌ {module}: {e}')
        "
    
    - name: Run pytest if tests exist
      run: |
        if [ -f "test.py" ] || [ -d "tests" ]; then
          python -m pytest -v --tb=short
        else
          echo "No test files found, skipping pytest"
        fi

  lint-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check Python syntax
      run: |
        python -m py_compile main.py
        python -m py_compile build.py
        find . -name "*.py" -exec python -m py_compile {} \;
        echo "✅ Syntax check passed"
    
    - name: Run flake8
      run: |
        flake8 --max-line-length=120 --ignore=E203,W503 --exclude=venv,build,dist,.git,__pycache__ .
    
    - name: Check import order with isort
      run: |
        isort --check-only --diff .
    
    - name: Check formatting with black
      run: |
        black --check --diff .

  build-sanity-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka ordered-set zstandard
        pip install -r requirements.txt
    
    - name: Test build script
      run: |
        python build.py --platform linux --clean
        echo "✅ Build script executed successfully"
    
    - name: Verify generated files
      run: |
        if [ -d "dist" ]; then
          echo "📁 Contents of dist/:"
          ls -la dist/
          echo "✅ Build output directory exists"
        else
          echo "⚠️  No dist directory created"
        fi

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install safety
      run: |
        python -m pip install --upgrade pip
        pip install safety
    
    - name: Check for vulnerable dependencies
      run: |
        safety check -r requirements.txt --output text
    
    - name: Check dependency compatibility
      run: |
        python -c "
        import pkg_resources
        with open('requirements.txt', 'r') as f:
            for line in f:
                line = line.strip()
                if line and not line.startswith('#'):
                    try:
                        pkg_resources.require(line)
                        print(f'✅ {line}')
                    except pkg_resources.VersionConflict as e:
                        print(f'⚠️  Version conflict: {line}')
                        print(f'   {e}')
                    except Exception as e:
                        print(f'❌ Error with {line}: {e}')
        "