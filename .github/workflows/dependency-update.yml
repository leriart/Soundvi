name: Update Dependencies

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install pip-tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-tools
    
    - name: Update requirements.txt
      run: |
        # Create temporary virtual environment
        python -m venv /tmp/venv
        source /tmp/venv/bin/activate
        
        # Install current dependencies
        pip install -r requirements.txt
        
        # Check for updates
        echo "Current versions:"
        pip list
        
        # Generate updated requirements
        pip-compile --upgrade --output-file requirements-updated.txt requirements.txt
        
        # Compare with current
        if diff -q requirements.txt requirements-updated.txt > /dev/null; then
          echo "✅ No updates available"
          echo "NO_UPDATES=true" >> $GITHUB_ENV
        else
          echo "📦 Updates available:"
          diff -u requirements.txt requirements-updated.txt || true
          echo "UPDATES_AVAILABLE=true" >> $GITHUB_ENV
        fi
    
    - name: Create Pull Request if updates available
      if: env.UPDATES_AVAILABLE == 'true'
      run: |
        # Configure git
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # Create branch
        BRANCH_NAME="deps/update-$(date +%Y%m%d)"
        git checkout -b $BRANCH_NAME
        
        # Update requirements.txt
        cp requirements-updated.txt requirements.txt
        
        # Commit changes
        git add requirements.txt
        git commit -m "chore: update Python dependencies
        
        Auto-generated by GitHub Actions"
        
        # Push and create PR
        git push origin $BRANCH_NAME
        
        # Create PR using GitHub CLI
        gh pr create \
          --title "Update Python dependencies" \
          --body "This PR updates Python dependencies to their latest compatible versions.
          
          ## Changes
          - Updated dependencies in requirements.txt
          - Auto-generated by dependency update workflow
          
          ## Review checklist
          - [ ] Test the application still works
          - [ ] Check for breaking changes in major version updates
          - [ ] Run CI tests" \
          --base main \
          --head $BRANCH_NAME
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-vulnerabilities:
    runs-on: ubuntu-latest
    needs: update-deps
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install safety
      run: |
        python -m pip install --upgrade pip
        pip install safety
    
    - name: Check for security vulnerabilities
      run: |
        safety check -r requirements.txt --output json > safety-report.json
        
        # Count vulnerabilities
        VULN_COUNT=$(jq '.vulnerabilities | length' safety-report.json)
        
        if [ "$VULN_COUNT" -gt 0 ]; then
          echo "⚠️  Found $VULN_COUNT security vulnerabilities"
          echo "VULNERABILITIES_FOUND=true" >> $GITHUB_ENV
          
          # Create issue if vulnerabilities found
          jq -r '.vulnerabilities[] | "### " + .package_name + " " + .analyzed_version + "\n" + .advisory + "\n"' safety-report.json > vuln-summary.md
          
          echo "## Security Vulnerabilities Found" > issue-body.md
          echo "" >> issue-body.md
          echo "**Workflow:** ${{ github.workflow }}" >> issue-body.md
          echo "**Run:** ${{ github.run_id }}" >> issue-body.md
          echo "" >> issue-body.md
          cat vuln-summary.md >> issue-body.md
          
          gh issue create \
            --title "Security vulnerabilities in dependencies" \
            --body-file issue-body.md \
            --label "security"
        else
          echo "✅ No security vulnerabilities found"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-updates:
    runs-on: ubuntu-latest
    needs: [update-deps, check-vulnerabilities]
    
    steps:
    - name: Check for updates
      id: check
      run: |
        if [ "${{ needs.update-deps.outputs.UPDATES_AVAILABLE }}" = "true" ]; then
          echo "UPDATES=true" >> $GITHUB_OUTPUT
        fi
        
        if [ "${{ needs.check-vulnerabilities.outputs.VULNERABILITIES_FOUND }}" = "true" ]; then
          echo "VULNERABILITIES=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Send notification
      if: steps.check.outputs.UPDATES == 'true' || steps.check.outputs.VULNERABILITIES == 'true'
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#notifications'
        username: 'Dependency Bot'
        icon_emoji: ':package:'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}