name: Docker Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to Docker Hub'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name == 'push' || inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  test-docker:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Build test image
      run: |
        docker build -t soundvi-test -f Dockerfile .
    
    - name: Test Docker container
      run: |
        # Test basic container functionality
        docker run --rm soundvi-test python --version
        docker run --rm soundvi-test ffmpeg -version
        
        # Test Python imports
        docker run --rm soundvi-test python -c "
        import sys
        print(f'Python {sys.version}')
        
        imports_to_test = [
            'cv2', 'numpy', 'librosa', 'moviepy',
            'PIL', 'scipy', 'pygame', 'pydub'
        ]
        
        for imp in imports_to_test:
            try:
                __import__(imp)
                print(f'✅ {imp}')
            except ImportError as e:
                print(f'❌ {imp}: {e}')
        "
    
    - name: Test application startup
      run: |
        # Test that the application can start (headless mode)
        docker run --rm -v $(pwd):/app soundvi-test python -c "
        try:
            # Test basic imports from the app
            from modules.manager import ModuleManager
            mm = ModuleManager()
            print(f'✅ ModuleManager loaded {len(mm.get_module_types())} modules')
            
            from utils.config import Config
            config = Config()
            print(f'✅ Config loaded')
            
            print('✅ All imports successful')
        except Exception as e:
            print(f'❌ Error: {e}')
            import traceback
            traceback.print_exc()
        "

  deploy-docker-hub:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-and-push, test-docker]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract version tag
      id: version
      run: |
        TAG=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$TAG" >> $GITHUB_OUTPUT
        echo "TAG=$TAG"
    
    - name: Build and push to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/soundvi:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/soundvi:${{ steps.version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max