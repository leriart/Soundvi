# .github/workflows/release.yml
name: Build and Release

on:
  push:
    tags:
      - 'v*'                # Se activa cuando se crea un tag con formato v1.0.0, v2.1, etc.
  workflow_dispatch:        # Permite ejecutar manualmente desde la UI

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            python-version: '3.10'
            build-args: '--portable'
          - os: ubuntu-latest
            platform: linux
            python-version: '3.10'
            build-args: '--portable'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Instalar FFmpeg (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Instalar FFmpeg (Windows)
        if: matrix.platform == 'windows'
        run: |
          choco install ffmpeg --no-progress
          echo "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configurar MSVC (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Ejecutar build.py
        run: python build.py --platform ${{ matrix.platform }} ${{ matrix.build-args }}

      - name: Subir artefactos (para depuración)
        uses: actions/upload-artifact@v4
        with:
          name: soundvi-${{ matrix.platform }}
          path: dist/*

      - name: Crear Release y subir assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
